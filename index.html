        { minutes: 20, label: '20m' },
        { minutes: 25, label: '25m' },
        { minutes: 30, label: '30m' },

        { minutes: 55, label: '55m' },

        { minutes: 90, label: '1h30m' },

      const ROUTES = {

      const NODE_STEP = 44;

      let dragStartX = 0;
      let dragStartTranslate = 0;
      let currentTranslate = 0;

      const GLOBE_LAYOUT_DEFAULTS = {

        },
      };

      const GLOBE = {
        radius: 1,
        currentStyle: 'clouds',
        textureLoader: null,
        textureCache: {},
        earthMesh: null,
        cloudsMesh: null,
        shaderAtmosphere: null,
        markerGroup: null,
        flightArcGroup: null,
        planeLayer: null,
        flightArcPoints: null,

        flightProgress: 0,
        scene: null,
        camera: null,
        renderer: null,
        pivotGroup: null,
        globeGroup: null,
        routeLayer: null,
        atmosphere: null,
        sun: null,
        ambient: null,
        targetRotation: { x: 0, y: 0 },
        currentRotation: { x: 0, y: 0 },
        targetCameraZ: GLOBE_LAYOUT.cameraFocusZ,
        currentCameraZ: GLOBE_LAYOUT.cameraFocusZ,
        idleSpeed: 0.0008,
        isAnimating: false,
        routePaused: false,
      };

      function latLngToVector3(lat, lng, radius = GLOBE.radius) {
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lng + 180);
        return new THREE.Vector3(
          -radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta)
        );
      }

      function rotationForLatLng(lat, lng) {
        return {
          x: THREE.MathUtils.degToRad(lat) * 0.95,
          y: -THREE.MathUtils.degToRad(lng) + Math.PI * 0.52,
        };
      }

      function centerLatLng(airports) {
        const coords = airports
          .map((airport) => AIRPORT_COORDS[airport.code])
          .filter(Boolean);
        if (!coords.length) return [0, 0];
        const lat = coords.reduce((sum, c) => sum + c[0], 0) / coords.length;
        const lng = coords.reduce((sum, c) => sum + c[1], 0) / coords.length;
        return [lat, lng];
      }

      function buildArcPoints(lat1, lng1, lat2, lng2) {
        const start = latLngToVector3(lat1, lng1, 1).normalize();
        const end = latLngToVector3(lat2, lng2, 1).normalize();
        const segments = 96;
        const surfaceOffset = 0.006;
        const points = [];

        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const v = new THREE.Vector3().copy(start).lerp(end, t).normalize();
          v.multiplyScalar(GLOBE.radius + surfaceOffset);
          points.push(v);
        }

        return points;
      }

      function routeFocusPoint(destCode) {
        const from = AIRPORT_COORDS[ORIGIN_AIRPORT];
        const to = AIRPORT_COORDS[destCode];
        if (!from || !to) return null;

        const start = latLngToVector3(from[0], from[1], 1);
        const end = latLngToVector3(to[0], to[1], 1);
        const mid = new THREE.Vector3().addVectors(start, end).normalize();
        const lat = 90 - THREE.MathUtils.radToDeg(Math.acos(THREE.MathUtils.clamp(mid.y, -1, 1)));
        const lng = THREE.MathUtils.radToDeg(Math.atan2(mid.z, -mid.x)) - 180;

        return { lat, lng };
      }

      function getRouteLayout(destCode) {
        const from = AIRPORT_COORDS[ORIGIN_AIRPORT];
        const to = AIRPORT_COORDS[destCode];
        if (!from || !to) return null;

        const start = latLngToVector3(from[0], from[1], 1).normalize();
        const end = latLngToVector3(to[0], to[1], 1).normalize();
        const distance = Math.max(start.angleTo(end), 0.02);

        const rotation = rotationForLatLng(from[0], from[1]);

        const scale = THREE.MathUtils.clamp(2.5 / Math.sqrt(distance), 1.8, 4.5);
        const fov = THREE.MathUtils.clamp(16 + distance * 8, 15, 28);
        const focusZ = scale + 1.5;

        return {
          positionX: 0,
          positionY: 0,
          positionZ: 0,
          scale,
          baseRotationX: GLOBE_LAYOUT_DEFAULTS.baseRotationX - rotation.x,
          baseRotationY: GLOBE_LAYOUT_DEFAULTS.baseRotationY - rotation.y,
          baseRotationZ: 0,
          cameraX: 0,
          cameraY: 0,
          cameraFov: fov,
          cameraOverviewZ: Math.max(focusZ + 2.5, GLOBE_LAYOUT_DEFAULTS.cameraOverviewZ),
          cameraFocusZ: focusZ,
        };
      }

      function applyRouteLayout(destCode) {
        const layout = getRouteLayout(destCode);
        if (!layout) return false;

        ROUTE_LAYOUT_KEYS.forEach((key) => {
          if (layout[key] !== undefined) GLOBE_LAYOUT[key] = layout[key];
        });

        GLOBE.currentRotation = { x: 0, y: 0 };
        GLOBE.targetRotation = { x: 0, y: 0 };
        GLOBE.currentCameraZ = GLOBE_LAYOUT.cameraOverviewZ;
        GLOBE.targetCameraZ = GLOBE_LAYOUT.cameraOverviewZ;
        GLOBE.isAnimating = false;

        applyGlobeLayout();
        return true;
      }

      function focusOnFlightRoute(destCode) {
        updateFlightArc(destCode);
      }

      const PLANE_STYLES = {
        classic: '🔷 经典色块',
        airliner: '✈️ 喷气客机',
        sprite: '🖼️ 贴图客机',
        fighter: '🛩️ 战斗机',
        orb: '💡 光球轨迹',
        arrow: '➤ 导航箭头',
      };
      let currentPlaneStyle = 'sprite';

      function makePlaneMat(color, opts = {}) {
        return new THREE.MeshBasicMaterial({
          color,
          depthTest: false,
          depthWrite: false,
          side: THREE.DoubleSide,
          ...opts,
        });
      }

      function finalizePlane(group) {
        group.traverse((child) => {
          if (child.isMesh || child.isSprite) {
            child.renderOrder = 1100;
            child.frustumCulled = false;
          }
        });
        return group;
      }

      function createPlane_classic() {

      let _airlinerTexture = null;
      function getAirlinerTexture() {
        if (_airlinerTexture) return _airlinerTexture;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = './static/airplane-sprite.png';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const d = imageData.data;
          for (let i = 0; i < d.length; i += 4) {
            const brightness = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
            if (brightness < 25) {
              d[i + 3] = 0;
            }
          }
          ctx.putImageData(imageData, 0, 0);
          _airlinerTexture.image = canvas;
          _airlinerTexture.needsUpdate = true;
        };
        _airlinerTexture = new THREE.Texture(img);
        _airlinerTexture.colorSpace = THREE.SRGBColorSpace;
        return _airlinerTexture;
      }

        wingShape.lineTo(-0.015 * s, 0.005 * s);

        wingShape.lineTo(-0.055 * s, -0.1 * s);
        wingShape.lineTo(-0.035 * s, -0.1 * s);
        wingShape.closePath();
        const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.006 * s, bevelEnabled: true, bevelThickness: 0.002 * s, bevelSize: 0.001 * s, bevelSegments: 2 });
        const wing = new THREE.Mesh(wingGeo, accentMat);

        const vertTailShape = new THREE.Shape();

        vertTailShape.lineTo(-0.01 * s, 0.05 * s);

        vertTailShape.lineTo(-0.035 * s, 0);
        vertTailShape.closePath();
        const vertTailGeo = new THREE.ExtrudeGeometry(vertTailShape, { depth: 0.004 * s, bevelEnabled: false });
        const vertTail = new THREE.Mesh(vertTailGeo, accentMat);
        vertTail.position.set(-0.06 * s, 0.005 * s, -0.002 * s);
        group.add(vertTail);

        const horizTailShape = new THREE.Shape();
        horizTailShape.moveTo(0, 0);
        horizTailShape.lineTo(-0.018 * s, 0.04 * s);
        horizTailShape.lineTo(-0.028 * s, 0.04 * s);
        horizTailShape.lineTo(-0.015 * s, 0);
        horizTailShape.lineTo(-0.028 * s, -0.04 * s);
        horizTailShape.lineTo(-0.018 * s, -0.04 * s);
        horizTailShape.closePath();
        const horizTailGeo = new THREE.ExtrudeGeometry(horizTailShape, { depth: 0.004 * s, bevelEnabled: false });
        const horizTail = new THREE.Mesh(horizTailGeo, darkMat);
        horizTail.rotation.x = Math.PI / 2;
        horizTail.position.set(-0.07 * s, 0.002 * s, 0);
        group.add(horizTail);

        [-1, 1].forEach((side) => {
          const pylonGeo = new THREE.BoxGeometry(0.012 * s, 0.01 * s, 0.004 * s);
          const pylon = new THREE.Mesh(pylonGeo, darkMat);
          pylon.position.set(-0.005 * s, -0.013 * s, side * 0.042 * s);
          group.add(pylon);

          const nacelle = new THREE.Mesh(new THREE.CylinderGeometry(0.009 * s, 0.008 * s, 0.032 * s, 12), darkMat);
          nacelle.rotation.z = Math.PI / 2;
          nacelle.position.set(-0.005 * s, -0.02 * s, side * 0.042 * s);

          const intake = new THREE.Mesh(new THREE.RingGeometry(0.004 * s, 0.009 * s, 12), windowMat);
          intake.rotation.y = Math.PI / 2;
          intake.position.set(0.012 * s, -0.02 * s, side * 0.042 * s);

        return finalizePlane(group);

      function createPlane_orb() {
        const group = new THREE.Group();

          { size: 0.025 * s, color: 0xffffff, opacity: 1 },

      function createPlane_arrow() {

      const PLANE_CREATORS = {
        classic: createPlane_classic,
        airliner: createPlane_airliner,
        sprite: createPlane_sprite,
        fighter: createPlane_fighter,
        orb: createPlane_orb,
        arrow: createPlane_arrow,
      };

      function createPlaneMesh() {
        const fn = PLANE_CREATORS[currentPlaneStyle] || createPlane_sprite;
        return fn();
      }

      function createFlightArcGroup(points) {
        const group = new THREE.Group();
        const t = GLOBE_LAYOUT.arcThickness;
        const makeMat = (color, opacity = 1) =>
          new THREE.MeshBasicMaterial({
            color,
            transparent: opacity < 1,
            opacity,
            depthTest: false,
            depthWrite: false,
            side: THREE.DoubleSide,
          });

        const curve = new THREE.CatmullRomCurve3(
          points.map((p) => p.clone()),
          false,
          'centripetal'
        );

        [
          { radius: 0.04 * t, color: 0xffd700, opacity: 0.3 },
          { radius: 0.022 * t, color: 0xffcc00, opacity: 0.85 },
          { radius: 0.012 * t, color: 0xffea00, opacity: 1 },
        ].forEach(({ radius, color, opacity }) => {
          const mesh = new THREE.Mesh(
            new THREE.TubeGeometry(curve, 96, radius, 8, false),
            makeMat(color, opacity)
          );
          mesh.renderOrder = 1000;
          mesh.frustumCulled = false;
          group.add(mesh);
        });

        return group;
      }

      function clearFlightArc() {
        if (GLOBE.flightArcGroup && GLOBE.routeLayer) {
          GLOBE.routeLayer.remove(GLOBE.flightArcGroup);
          GLOBE.flightArcGroup.traverse((child) => {
            child.geometry?.dispose();
            if (child.material) {
              if (Array.isArray(child.material)) child.material.forEach((m) => m.dispose());
              else child.material.dispose();
            }
          });
          GLOBE.flightArcGroup = null;
        }
        if (GLOBE.planeLayer && GLOBE.routeLayer) {
          GLOBE.routeLayer.remove(GLOBE.planeLayer);
          GLOBE.planeLayer.traverse((child) => {
            child.geometry?.dispose();
            if (child.material) {
              if (Array.isArray(child.material)) child.material.forEach((m) => m.dispose());
              else child.material.dispose();
            }
          });
          GLOBE.planeLayer = null;
        }
        GLOBE.flightArcPoints = null;
        GLOBE.planeGroup = null;
      }

      function createEndpointMarker(position, color, size) {
        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({
          color,
          depthTest: false,
          depthWrite: false,
        });
        const dot = new THREE.Mesh(new THREE.SphereGeometry(size, 16, 16), mat);
        dot.renderOrder = 1050;
        dot.frustumCulled = false;
        group.add(dot);

        const glowMat = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.35,
          depthTest: false,
          depthWrite: false,
        });
        const glow = new THREE.Mesh(new THREE.SphereGeometry(size * 2.2, 16, 16), glowMat);
        glow.renderOrder = 1049;
        glow.frustumCulled = false;
        group.add(glow);

        group.position.copy(position);
        return group;
      }

      const BASE_IDLE_SPEED = 0.0008;

      function updateFlightArc(destCode) {
        if (!GLOBE.routeLayer) return false;
        clearFlightArc();
        if (!destCode || destCode === ORIGIN_AIRPORT) {
          GLOBE.idleSpeed = BASE_IDLE_SPEED;
          return false;
        }

        const from = AIRPORT_COORDS[ORIGIN_AIRPORT];
        const to = AIRPORT_COORDS[destCode];
        if (!from || !to) return false;

        try {
          let dLng = to[1] - from[1];
          if (dLng > 180) dLng -= 360;
          if (dLng < -180) dLng += 360;
          GLOBE.idleSpeed = dLng >= 0
            ? -Math.abs(BASE_IDLE_SPEED)
            :  Math.abs(BASE_IDLE_SPEED);

          const points = buildArcPoints(from[0], from[1], to[0], to[1]);
          if (!points.length) return false;

          GLOBE.flightArcPoints = points;
          GLOBE.flightArcGroup = createFlightArcGroup(points);

          const originPos = latLngToVector3(from[0], from[1], GLOBE.radius + 0.012);
          const destPos = latLngToVector3(to[0], to[1], GLOBE.radius + 0.012);
          GLOBE.flightArcGroup.add(createEndpointMarker(originPos, 0x00ccff, 0.022));
          GLOBE.flightArcGroup.add(createEndpointMarker(destPos, 0xffd700, 0.022));

          GLOBE.routeLayer.add(GLOBE.flightArcGroup);

          GLOBE.planeGroup = createPlaneMesh();
          GLOBE.planeLayer = new THREE.Group();
          GLOBE.planeLayer.add(GLOBE.planeGroup);
          GLOBE.routeLayer.add(GLOBE.planeLayer);

          const startIndex = Math.floor(0.15 * (points.length - 1));
          const nextIndex = Math.min(startIndex + 1, points.length - 1);
          const current = points[startIndex];
          const next = points[nextIndex];
          const tangent = new THREE.Vector3().subVectors(next, current).normalize();
          const lift = current.clone().normalize().multiplyScalar(0.04);
          GLOBE.planeGroup.position.copy(current).add(lift);
          GLOBE.planeGroup.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), tangent);
          GLOBE.flightProgress = 0.15;
          return true;
        } catch (error) {
          console.error('updateFlightArc failed', error);
          clearFlightArc();
          return false;
        }
      }

      function showFlightRoute(destCode) {
        if (!destCode || destCode === ORIGIN_AIRPORT) {
          GLOBE.idleSpeed = BASE_IDLE_SPEED;
          GLOBE.routePaused = false;
          return updateFlightArc(destCode);
        }

        const to = AIRPORT_COORDS[destCode];
        if (!to) return false;

        const rotation = rotationForLatLng(to[0], to[1]);
        GLOBE.targetRotation.x = rotation.x;
        GLOBE.targetRotation.y = rotation.y;
        GLOBE.isAnimating = true;
        GLOBE.routePaused = true;

        return updateFlightArc(destCode);
      }

      function addMarkerAt(code, options = {}) {
        const coords = AIRPORT_COORDS[code];
        if (!coords || !GLOBE.markerGroup) return;

        const {
          active = false,
          isOrigin = false,
          color = isOrigin ? 0x5eead4 : active ? 0xffd700 : 0xffffff,
          size = isOrigin ? 0.02 : active ? 0.024 : 0.018,
        } = options;

        const position = latLngToVector3(coords[0], coords[1], GLOBE.radius + 0.012);
        const marker = new THREE.Mesh(
          new THREE.SphereGeometry(size, 20, 20),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: isOrigin ? 1 : active ? 1 : 0.85,
          })
        );
        marker.position.copy(position);

        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(size * 1.6, 16, 16),
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: isOrigin ? 0.3 : active ? 0.28 : 0.12,
          })
        );
        glow.position.copy(position);

        GLOBE.markerGroup.add(glow);
        GLOBE.markerGroup.add(marker);
      }

      function renderOriginMarker() {
        addMarkerAt(ORIGIN_AIRPORT, { isOrigin: true });
      }

      function stopGlobeAnimation() {
        if (globeAnimationTimer) {
          clearTimeout(globeAnimationTimer);
          globeAnimationTimer = null;
        }
        GLOBE.isAnimating = false;
      }

      function setGlobeTarget(lat, lng, cameraZ) {
        const rotation = rotationForLatLng(lat, lng);
        GLOBE.targetRotation.x = rotation.x;
        GLOBE.targetRotation.y = rotation.y;
        GLOBE.targetCameraZ = cameraZ;
        GLOBE.isAnimating = true;
      }

      function applyGlobeLayout() {
        if (!GLOBE.pivotGroup || !GLOBE.camera) return;

        GLOBE.pivotGroup.position.set(
          GLOBE_LAYOUT.positionX,
          GLOBE_LAYOUT.positionY,
          GLOBE_LAYOUT.positionZ
        );
        GLOBE.pivotGroup.scale.setScalar(GLOBE_LAYOUT.scale);

        GLOBE.globeGroup.rotation.set(
          GLOBE_LAYOUT.baseRotationX + GLOBE.currentRotation.x,
          GLOBE_LAYOUT.baseRotationY + GLOBE.currentRotation.y,
          GLOBE_LAYOUT.baseRotationZ
        );

        GLOBE.camera.position.set(GLOBE_LAYOUT.cameraX, GLOBE_LAYOUT.cameraY, GLOBE.currentCameraZ);
        GLOBE.camera.fov = GLOBE_LAYOUT.cameraFov;
        GLOBE.camera.updateProjectionMatrix();

        if (GLOBE.sun) {
          GLOBE.sun.position.set(GLOBE_LAYOUT.sunX, GLOBE_LAYOUT.sunY, GLOBE_LAYOUT.sunZ);
          GLOBE.sun.intensity = GLOBE_LAYOUT.sunIntensity;
        }
        if (GLOBE.ambient) {
          GLOBE.ambient.intensity = GLOBE_LAYOUT.ambientIntensity;
        }
        if (GLOBE.atmosphere?.material) {
          GLOBE.atmosphere.material.opacity = GLOBE_LAYOUT.atmosphereOpacity;
        }
      }

      function getGlobeTexture(url) {
        if (!url) return null;
        if (!GLOBE.textureCache[url]) {
          const texture = GLOBE.textureLoader.load(url);
          texture.colorSpace = THREE.SRGBColorSpace;
          GLOBE.textureCache[url] = texture;
        }
        return GLOBE.textureCache[url];
      }

      function disposeCloudLayer() {
        if (!GLOBE.cloudsMesh) return;
        GLOBE.globeGroup.remove(GLOBE.cloudsMesh);
        GLOBE.cloudsMesh.geometry.dispose();
        GLOBE.cloudsMesh.material.dispose();
        GLOBE.cloudsMesh = null;
      }

      function disposeShaderAtmosphere() {
        if (!GLOBE.shaderAtmosphere) return;
        GLOBE.globeGroup.remove(GLOBE.shaderAtmosphere);
        GLOBE.shaderAtmosphere.geometry.dispose();
        GLOBE.shaderAtmosphere.material.dispose();
        GLOBE.shaderAtmosphere = null;
      }

      function createShaderAtmosphere(color, scale, intensity) {
        disposeShaderAtmosphere();
        const geo = new THREE.SphereGeometry(GLOBE.radius * scale, 64, 64);
        const mat = new THREE.ShaderMaterial({
          vertexShader: `
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
              vNormal = normalize(normalMatrix * normal);
              vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 uColor;
            uniform float uIntensity;
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            void main() {
              float rim = pow(${intensity.toFixed(2)} - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
              gl_FragColor = vec4(uColor, 1.0) * rim * uIntensity;
            }
          `,
          uniforms: {
            uColor: { value: new THREE.Vector3(color[0], color[1], color[2]) },
            uIntensity: { value: intensity },
          },
          blending: THREE.AdditiveBlending,
          side: THREE.BackSide,
          transparent: true,
          depthWrite: false,
        });
        GLOBE.shaderAtmosphere = new THREE.Mesh(geo, mat);
        GLOBE.globeGroup.add(GLOBE.shaderAtmosphere);
      }

      function applyGlobeStyle(styleId) {
        const style = GLOBE_STYLES[styleId];
        if (!style || !GLOBE.earthMesh) return;

        GLOBE.currentStyle = styleId;
        disposeCloudLayer();
        disposeShaderAtmosphere();

        const oldMaterial = GLOBE.earthMesh.material;
        let newMaterial;

        switch (style.type) {
          case 'phong':
            newMaterial = new THREE.MeshPhongMaterial({
              map: getGlobeTexture(style.map),
              normalMap: getGlobeTexture(style.normalMap),
              specularMap: getGlobeTexture(style.specularMap),
              specular: new THREE.Color(style.specular),
              shininess: style.shininess,
            });
            break;
          case 'night':
            newMaterial = new THREE.MeshStandardMaterial({
              color: style.color,
              emissive: new THREE.Color(style.emissive),
              emissiveMap: getGlobeTexture(style.emissiveMap),
              emissiveIntensity: style.emissiveIntensity,
              metalness: 0.15,
              roughness: 0.9,
            });
            break;
          case 'clouds':
            newMaterial = new THREE.MeshPhongMaterial({
              map: getGlobeTexture(style.map),
              shininess: 8,
            });
            GLOBE.cloudsMesh = new THREE.Mesh(
              new THREE.SphereGeometry(GLOBE.radius * 1.008, 64, 64),
              new THREE.MeshPhongMaterial({
                map: getGlobeTexture(style.cloudsMap),
                transparent: true,
                opacity: 0.42,
                depthWrite: false,
              })
            );
            GLOBE.globeGroup.add(GLOBE.cloudsMesh);
            break;
          case 'flightTracker':
            newMaterial = new THREE.MeshPhongMaterial({
              map: getGlobeTexture(style.map),
              normalMap: getGlobeTexture(style.normalMap),
              specularMap: getGlobeTexture(style.specularMap),
              specular: new THREE.Color(style.specular),
              shininess: style.shininess,
            });
            break;
          case 'flightArc':
            newMaterial = new THREE.MeshStandardMaterial({
              color: style.color,
              emissive: new THREE.Color(style.emissive),
              emissiveMap: getGlobeTexture(style.emissiveMap),
              emissiveIntensity: style.emissiveIntensity,
              metalness: 0.2,
              roughness: 0.8,
            });
            break;
          default:
            return;
        }

        GLOBE.earthMesh.material = newMaterial;
        oldMaterial.dispose();

        if (style.useShaderAtmosphere) {
          createShaderAtmosphere(
            style.shaderColor,
            style.shaderScale,
            style.shaderIntensity
          );
          if (GLOBE.atmosphere) GLOBE.atmosphere.visible = false;
        } else {
          if (GLOBE.atmosphere) {
            GLOBE.atmosphere.visible = true;
            GLOBE.atmosphere.material.color.setHex(style.atmosphereColor);
            GLOBE.atmosphere.material.opacity =
              style.atmosphereOpacity ?? GLOBE_LAYOUT.atmosphereOpacity;
          }
        }
      }

      function clearMarkers() {
        if (!GLOBE.markerGroup) return;
        while (GLOBE.markerGroup.children.length) {
          const child = GLOBE.markerGroup.children[0];
          GLOBE.markerGroup.remove(child);
          child.geometry?.dispose();
          child.material?.dispose();
        }
      }

      function renderMarkers(airports, activeIndex, routeFocus = false) {
        if (!GLOBE.markerGroup) return;
        clearMarkers();

        if (routeFocus) {
          addMarkerAt(ORIGIN_AIRPORT, { isOrigin: true, size: 0.016 });
          addMarkerAt(airports[activeIndex].code, { active: true, size: 0.018 });
          return;
        }

        renderOriginMarker();
        airports.forEach((airport, index) => {
          addMarkerAt(airport.code, { active: index === activeIndex });
        });
      }

      function animateGlobeView(airports, activeIndex) {
        if (!GLOBE.globeGroup) return;
        showFlightRoute(airports[activeIndex].code);
      }

      function focusAirport(code, cardIndex) {
        activeAirportIndex = cardIndex;
        showFlightRoute(code);
      }

      function initGlobe() {
        const width = globeStage.clientWidth;
        const height = globeStage.clientHeight;

        GLOBE.scene = new THREE.Scene();
        GLOBE.camera = new THREE.PerspectiveCamera(
          GLOBE_LAYOUT.cameraFov,
          width / height,
          0.1,
          100
        );
        GLOBE.camera.position.set(
          GLOBE_LAYOUT.cameraX,
          GLOBE_LAYOUT.cameraY,
          GLOBE_LAYOUT.cameraFocusZ
        );

        GLOBE.renderer = new THREE.WebGLRenderer({
          canvas: globeCanvas,
          antialias: true,
          alpha: true,
        });
        GLOBE.renderer.setSize(width, height);
        GLOBE.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        GLOBE.renderer.setClearColor(0x020202, 1);
        GLOBE.renderer.sortObjects = true;

        GLOBE.ambient = new THREE.AmbientLight(0x8899bb, GLOBE_LAYOUT.ambientIntensity);
        GLOBE.sun = new THREE.DirectionalLight(0xffffff, GLOBE_LAYOUT.sunIntensity);
        GLOBE.sun.position.set(GLOBE_LAYOUT.sunX, GLOBE_LAYOUT.sunY, GLOBE_LAYOUT.sunZ);
        GLOBE.scene.add(GLOBE.ambient, GLOBE.sun);

        const starsGeometry = new THREE.BufferGeometry();
        const starCount = 500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 1) {
          starPositions[i] = (Math.random() - 0.5) * 30;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(
          starsGeometry,
          new THREE.PointsMaterial({ color: 0xffffff, size: 0.03, transparent: true, opacity: 0.55 })
        );
        GLOBE.scene.add(stars);

        GLOBE.textureLoader = new THREE.TextureLoader();
        GLOBE.pivotGroup = new THREE.Group();
        GLOBE.globeGroup = new THREE.Group();
        GLOBE.markerGroup = new THREE.Group();

        const earthGeometry = new THREE.SphereGeometry(GLOBE.radius, 64, 64);
        GLOBE.earthMesh = new THREE.Mesh(
          earthGeometry,
          new THREE.MeshPhongMaterial({ color: 0x224466 })
        );
        GLOBE.globeGroup.add(GLOBE.earthMesh);

        const atmosphereGeometry = new THREE.SphereGeometry(GLOBE.radius * 1.015, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
          color: 0x4da6ff,
          transparent: true,
          opacity: GLOBE_LAYOUT.atmosphereOpacity,
          side: THREE.BackSide,
          depthWrite: false,
        });
        GLOBE.atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        GLOBE.globeGroup.add(GLOBE.atmosphere);
        GLOBE.globeGroup.add(GLOBE.markerGroup);
        GLOBE.routeLayer = new THREE.Group();
        GLOBE.routeLayer.renderOrder = 100;
        GLOBE.globeGroup.add(GLOBE.routeLayer);
        GLOBE.pivotGroup.add(GLOBE.globeGroup);
        GLOBE.scene.add(GLOBE.pivotGroup);

        applyGlobeStyle('clouds');

        GLOBE.currentRotation = { x: 0, y: 0 };
        GLOBE.targetRotation = { x: 0, y: 0 };
        GLOBE.currentCameraZ = GLOBE_LAYOUT.cameraOverviewZ;
        GLOBE.targetCameraZ = GLOBE_LAYOUT.cameraOverviewZ;
        GLOBE.isAnimating = false;

        clearMarkers();
        renderOriginMarker();
        clearFlightArc();

        applyGlobeLayout();

        function tick() {
          requestAnimationFrame(tick);

          const ease = GLOBE.isAnimating ? 0.055 : 0.035;
          GLOBE.currentRotation.x += (GLOBE.targetRotation.x - GLOBE.currentRotation.x) * ease;
          GLOBE.currentRotation.y += (GLOBE.targetRotation.y - GLOBE.currentRotation.y) * ease;
          GLOBE.currentCameraZ += (GLOBE.targetCameraZ - GLOBE.currentCameraZ) * (GLOBE.isAnimating ? 0.048 : 0.035);

          if (!GLOBE.isAnimating && !globeAnimationTimer && !routeInteractionStarted && !GLOBE.routePaused) {
            GLOBE.targetRotation.y += GLOBE.idleSpeed;
          }

          if (GLOBE.planeGroup && GLOBE.flightArcPoints?.length > 1) {
            GLOBE.flightProgress = (GLOBE.flightProgress + 0.0020) % 1;
            const arcIndex = Math.floor(GLOBE.flightProgress * (GLOBE.flightArcPoints.length - 1));
            const nextIndex = Math.min(arcIndex + 1, GLOBE.flightArcPoints.length - 1);
            const current = GLOBE.flightArcPoints[arcIndex];
            const next = GLOBE.flightArcPoints[nextIndex];
            const tangent = new THREE.Vector3().subVectors(next, current).normalize();
            const lift = current.clone().normalize().multiplyScalar(0.04);
            GLOBE.planeGroup.position.copy(current).add(lift);
            GLOBE.planeGroup.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), tangent);

            if (GLOBE.planeGroup._isSpritePlane && GLOBE.planeGroup._sprite) {
              GLOBE.globeGroup.updateMatrixWorld(true);
              const gm = GLOBE.globeGroup.matrixWorld;
              const worldA = current.clone().add(lift).applyMatrix4(gm);
              const worldB = next.clone().add(next.clone().normalize().multiplyScalar(0.04)).applyMatrix4(gm);
              const sA = worldA.project(GLOBE.camera);
              const sB = worldB.project(GLOBE.camera);
              const screenAngle = Math.atan2(sB.y - sA.y, sB.x - sA.x);
              GLOBE.planeGroup._sprite.material.rotation = screenAngle - Math.PI / 4;
            }
          }

          if (GLOBE.cloudsMesh) {
            GLOBE.cloudsMesh.rotation.y += 0.00035;
          }

          applyGlobeLayout();

          const animatingRotation =
            Math.abs(GLOBE.targetRotation.x - GLOBE.currentRotation.x) > 0.001 ||
            Math.abs(GLOBE.targetRotation.y - GLOBE.currentRotation.y) > 0.001 ||
            Math.abs(GLOBE.targetCameraZ - GLOBE.currentCameraZ) > 0.01;

          if (GLOBE.isAnimating && !animatingRotation && !globeAnimationTimer) {
            GLOBE.isAnimating = false;
          }

          GLOBE.renderer.render(GLOBE.scene, GLOBE.camera);
        }

        tick();

        // Globe drag-to-rotate
        let _globeDrag = false;
        let _globeLastX = 0;
        let _globeLastY = 0;

        globeCanvas.addEventListener('pointerdown', (e) => {
          _globeDrag = true;
          _globeLastX = e.clientX;
          _globeLastY = e.clientY;
          globeCanvas.setPointerCapture(e.pointerId);
        });

        globeCanvas.addEventListener('pointermove', (e) => {
          if (!_globeDrag) return;
          const dx = e.clientX - _globeLastX;
          const dy = e.clientY - _globeLastY;
          _globeLastX = e.clientX;
          _globeLastY = e.clientY;
          GLOBE.targetRotation.y += dx * 0.005;
          GLOBE.targetRotation.x += dy * 0.005;
          GLOBE.targetRotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, GLOBE.targetRotation.x));
        });

        const endGlobeDrag = () => { _globeDrag = false; };
        globeCanvas.addEventListener('pointerup', endGlobeDrag);
        globeCanvas.addEventListener('pointercancel', endGlobeDrag);
      }

      function getCurrentAirports() {
        const time = TIME_NODES[selectedIndex].minutes;
        return ROUTES[time];
      }

      function getTrackWidth() {
        return timelineTrack.clientWidth;
      }

      function translateForIndex(index) {
        return getTrackWidth() / 2 - index * NODE_STEP - NODE_STEP / 2;
      }

      function clampTranslate(value) {
        const min = translateForIndex(TIME_NODES.length - 1);
        const max = translateForIndex(0);
        return Math.max(min, Math.min(max, value));
      }

      function indexFromTranslate(translate) {
        const centerPos = getTrackWidth() / 2 - translate - NODE_STEP / 2;
        return Math.max(0, Math.min(TIME_NODES.length - 1, Math.round(centerPos / NODE_STEP)));
      }

      function applyStripTransform(animate) {
        timelineStrip.style.transition = animate
          ? 'transform 0.32s cubic-bezier(0.22, 1, 0.36, 1)'
          : 'none';
        timelineStrip.style.transform = `translate3d(${currentTranslate}px, 0, 0)`;
      }

      function updateNodeStyles(highlightIndex = selectedIndex) {
        timelineStrip.querySelectorAll('.timeline-node').forEach((node, index) => {
          const active = index === highlightIndex;
          const label = node.querySelector('.time-label');
          const tick = node.querySelector('.time-tick');
          label.style.color = active ? 'rgb(255, 215, 0)' : 'rgb(255, 255, 255)';
          label.style.opacity = active ? '1' : '0.55';
          tick.style.opacity = active ? '0' : '0.3';
        });
      }

      function renderTimeline() {
        timelineStrip.innerHTML = TIME_NODES.map(
          (node, index) => `
            <div class="timeline-node" data-index="${index}" style="width: ${NODE_STEP}px">
              <div class="time-label text-[10.26px] font-bold whitespace-nowrap">${node.label}</div>
              <div class="time-tick-slot">
                <div class="time-tick"></div>
              </div>
            </div>
          `
        ).join('');

        currentTranslate = translateForIndex(selectedIndex);
        applyStripTransform(false);
        updateNodeStyles();
      }

      function snapToIndex(index, animate = true) {
        const next = Math.max(0, Math.min(TIME_NODES.length - 1, index));
        const changed = next !== selectedIndex;
        selectedIndex = next;
        currentTranslate = translateForIndex(selectedIndex);
        applyStripTransform(animate);
        updateNodeStyles();
        if (changed) updateAirports();
      }

      function updateAirports() {
        const time = TIME_NODES[selectedIndex].minutes;
        const airports = ROUTES[time];
        activeAirportIndex = -1;

        airportCards.forEach((card) => card.classList.add('is-updating'));

        window.setTimeout(() => {
          airportCards.forEach((card, i) => {
            const airport = airports[i];
            const codeEl = card.querySelector('.airport-code');
            const nameEl = card.querySelector('.airport-name');
            codeEl.textContent = airport.code;
            nameEl.textContent = airport.name;
            card.dataset.code = airport.code;
            card.classList.remove('is-active');
            card.classList.remove('is-updating');
          });
          clearFlightArc();
          GLOBE.routePaused = false;
          GLOBE.idleSpeed = BASE_IDLE_SPEED;
        }, 120);
      }

      function onPointerDown(event) {
        isDragging = true;
        dragStartX = event.clientX;
        dragStartTranslate = currentTranslate;
        lastMoveX = event.clientX;
        lastMoveTime = performance.now();
        velocity = 0;
        pendingIndex = selectedIndex;
        timelineStrip.style.transition = 'none';
        timelineTrack.setPointerCapture(event.pointerId);
      }

      function onPointerMove(event) {
        if (!isDragging) return;
        const now = performance.now();
        const delta = event.clientX - dragStartX;
        currentTranslate = clampTranslate(dragStartTranslate + delta);
        applyStripTransform(false);

        const dt = now - lastMoveTime;
        if (dt > 0) {
          velocity = (event.clientX - lastMoveX) / dt;
        }
        lastMoveX = event.clientX;
        lastMoveTime = now;

        const previewIndex = indexFromTranslate(currentTranslate);
        if (previewIndex !== pendingIndex) {
          pendingIndex = previewIndex;
          updateNodeStyles(previewIndex);
        }
      }

      function onPointerUp(event) {
        if (!isDragging) return;
        isDragging = false;
        timelineTrack.releasePointerCapture(event.pointerId);

        const inertiaOffset = velocity * 120;
        const targetTranslate = clampTranslate(currentTranslate + inertiaOffset);
        const targetIndex = indexFromTranslate(targetTranslate);
        snapToIndex(targetIndex, true);
      }

      timelineTrack.addEventListener('pointerdown', onPointerDown);
      timelineTrack.addEventListener('pointermove', onPointerMove);
      timelineTrack.addEventListener('pointerup', onPointerUp);
      timelineTrack.addEventListener('pointercancel', onPointerUp);

      window.addEventListener('resize', () => {
        renderTimeline();
        snapToIndex(selectedIndex, false);
        if (GLOBE.renderer && GLOBE.camera) {
          const width = globeStage.clientWidth;
          const height = globeStage.clientHeight;
          GLOBE.camera.aspect = width / height;
          GLOBE.camera.updateProjectionMatrix();
          GLOBE.renderer.setSize(width, height);
        }
      });

      airportCards.forEach((card) => {
        card.addEventListener('click', () => {
          const index = Number(card.dataset.index);
          const code = card.dataset.code || card.querySelector('.airport-code').textContent.trim();
          airportCards.forEach((c, i) => c.classList.toggle('is-active', i === index));
          focusAirport(code, index);
        });
      });

      renderTimeline();
      initGlobe();

        const backBtn = document.getElementById('page-back-btn');
        let onTicketPage = false;

        if (!reserveBtn || !ticketFrame) return;

        function returnToHomePage() {
          onTicketPage = false;
          bottomPanel.style.opacity = '1';
          bottomPanel.style.pointerEvents = '';
          vignette.style.opacity = '1';
          globeStageEl.style.opacity = '1';
          ticketFrame.style.opacity = '0';
          ticketFrame.style.pointerEvents = 'none';
        }

        reserveBtn.addEventListener('click', () => {
          if (onTicketPage) return;
          onTicketPage = true;

          bottomPanel.style.opacity = '0';
          bottomPanel.style.pointerEvents = 'none';
          vignette.style.opacity = '0';
          globeStageEl.style.transition = 'opacity 0.6s ease';
          globeStageEl.style.opacity = '0';

          ticketFrame.style.opacity = '1';
          ticketFrame.style.pointerEvents = 'auto';

          const airports = getCurrentAirports();
          if (airports && activeAirportIndex >= 0 && activeAirportIndex < airports.length) {
            const dest = airports[activeAirportIndex];
            const info = AIRPORTS[dest.code] || {};
            ticketFrame.contentWindow?.postMessage({
              type: 'set-destination',
              code: dest.code,
              name: info.name || '',
              english: info.english || '',
            }, '*');
          }

          const selectedMinutes = TIME_NODES[selectedIndex].minutes;
        });

        if (backBtn) {
          backBtn.addEventListener('click', () => {
            if (!onTicketPage) return;
            returnToHomePage();
          });
        }

        window.addEventListener('message', (event) => {
          if (event.data?.type === 'exit-to-home') {
            returnToHomePage();
          }
        });
      })();
    </script>
  </body>
</html>
